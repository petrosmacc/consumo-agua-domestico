<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Consumo de Água</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f8ff; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: #0077be; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0077be; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #005fa3; }
        #resultado { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .economia { background-color: #d4edda; color: #155724; }
        .limite { background-color: #fff3cd; color: #856404; }
        .alerta { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="card">
    <h2>Consumo de Água 💧</h2>
    <div class="input-group">
        <label>Consumo na conta (m³):</label>
        <input type="number" id="m3" placeholder="Ex: 15">
    </div>
    <div class="input-group">
        <label>Dias de leitura:</label>
        <input type="number" id="dias" placeholder="Ex: 30">
    </div>
    <div class="input-group">
        <label>Pessoas na casa:</label>
        <input type="number" id="pessoas" placeholder="Ex: 4">
    </div>
    <button onclick="calcular()">Analisar Consumo</button>

    <div id="resultado"></div>
</div>

<script>
    function calcular() {
        // Captura de valores
        const m3 = parseFloat(document.getElementById('m3').value);
        const dias = parseFloat(document.getElementById('dias').value);
        const pessoas = parseFloat(document.getElementById('pessoas').value);
        const resDiv = document.getElementById('resultado');

        if (!m3 || !dias || !pessoas) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        // Lógica Matemática (A mesma do nosso C++)
        const volumeL = m3 * 1000;
        const consumoDiarioPessoa = (volumeL / dias) / pessoas;

        // Lógica de Perfil e Exibição
        let perfil = "";
        let classe = "";

        if (consumoDiarioPessoa < 150) {
            perfil = "<b>Parabéns!</b> Vocês praticam a economia de água.";
            classe = "economia";
        } else if (consumoDiarioPessoa <= 300) {
            perfil = "<b>Atenção:</b> Consumo no limite do bom senso.";
            classe = "limite";
        } else {
            perfil = "<b>Alerta!</b> Reflitam sobre o uso ou verifiquem vazamentos.";
            classe = "alerta";
        }

        resDiv.style.display = "block";
        resDiv.className = classe;
        resDiv.innerHTML = `
            <p>Consumo: ${consumoDiarioPessoa.toFixed(2)} L/pessoa/dia</p>
            <p>${perfil}</p>
        `;
    }
</script>

</body>
</html>
